<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if not .IsHome }}{{ .Title }} — {{ end }}{{ site.Title }}</title>
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  {{- $svg := readFile "themes/thomaswickham/static/images/pokeball-pattern.svg" -}}
  <style>
  body {
    background-image: url("data:image/svg+xml;base64,{{ $svg | base64Encode }}");
    background-repeat: repeat;
    background-size: 360px 240px;
  }
  </style>
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>
</head>
<body>
  <header>
    <div class="site-name"><a href="/">{{ site.Title }}</a></div>
    <nav>
      {{ range site.Menus.main }}
      <a href="{{ .URL }}">{{ .Name }}</a>
      {{ end }}
      <button id="theme-toggle" aria-label="Toggle theme" title="Toggle light/dark">◐</button>
    </nav>
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
  </footer>
  <script>
    document.getElementById('theme-toggle').addEventListener('click', function() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
  </script>
</body>
</html>
